name: fraud-monitoring

x-app-environment: &app-environment
  DB_HOST: postgres
  DB_PORT: 5432
  DB_NAME: ${POSTGRES_DB:-fraud_monitoring}
  DB_USER: ${POSTGRES_USER:-fraud_app}
  DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}

x-app-dependencies: &app-dependencies
  postgres:
    condition: service_healthy
  db-init:
    condition: service_completed_successfully
  kafka:
    condition: service_healthy
  kafka-init:
    condition: service_completed_successfully

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fraud_monitoring}
      POSTGRES_USER: ${POSTGRES_USER:-fraud_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  db-init:
    image: ${APP_IMAGE}
    command:
      - python
      - -c
      - |
        from pathlib import Path
        from db.database import get_connection

        with get_connection() as connection:
            connection.execute(Path("/app/db/schema.sql").read_text())
    environment:
      <<: *app-environment
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  kafka:
    image: apache/kafka:latest
    ports:
      - "${KAFKA_EXTERNAL_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:${KAFKA_EXTERNAL_PORT:-9092}
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:29092 --list"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 10s
    volumes:
      - kafka_data:/var/lib/kafka/data

  kafka-init:
    image: apache/kafka:latest
    command:
      - /bin/sh
      - -ec
      - |
        for topic in transactions fraud-alerts; do
          /opt/kafka/bin/kafka-topics.sh \
            --bootstrap-server kafka:29092 \
            --create \
            --if-not-exists \
            --topic "$$topic" \
            --partitions 3 \
            --replication-factor 1
        done
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"

  load-generator:
    image: ${APP_IMAGE}
    command: ["python", "-m", "app.main"]
    environment:
      <<: *app-environment
    depends_on:
      <<: *app-dependencies
    restart: "no"

  outbox-worker:
    image: ${APP_IMAGE}
    command: ["python", "-m", "app.workers.outbox_worker"]
    environment:
      <<: *app-environment
      KAFKA_URL: kafka:29092
      OUTBOX_POLL_INTERVAL_SECONDS: ${OUTBOX_POLL_INTERVAL_SECONDS:-1}
      OUTBOX_BATCH_SIZE: ${OUTBOX_BATCH_SIZE:-100}
    depends_on:
      <<: *app-dependencies
    deploy:
      replicas: 3
    restart: unless-stopped

  fraud-consumer:
    image: ${APP_IMAGE}
    command: ["python", "-m", "app.consumer.kafka_fraud_consumer"]
    environment:
      <<: *app-environment
      KAFKA_URL: kafka:29092
      KAFKA_TOPIC: transactions
      KAFKA_GROUP_ID: fraud-monitor
    depends_on:
      <<: *app-dependencies
    deploy:
      replicas: 3
    restart: unless-stopped

  web-server:
    image: ${APP_IMAGE}
    command: ["uvicorn", "app.web_server:app", "--host", "0.0.0.0", "--port", "8080"]
    environment:
      <<: *app-environment
    ports:
      - "${WEB_EXTERNAL_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    restart: unless-stopped

  web-client:
    image: ${WEB_CLIENT_IMAGE}
    ports:
      - "${WEB_CLIENT_EXTERNAL_PORT:-4200}:80"
    depends_on:
      web-server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  kafka_data:
