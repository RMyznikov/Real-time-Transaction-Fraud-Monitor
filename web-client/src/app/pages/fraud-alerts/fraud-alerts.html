<section class="page-heading">
  <div>
    <p>RISK SIGNALS</p>
    <h1>Fraud alerts</h1>
    <span>Review detection results and risk scores emitted by the fraud rules.</span>
  </div>
  <div class="record-count alert"><strong>{{ total().toLocaleString() }}</strong><span>active signals</span></div>
</section>

<section class="table-shell alerts-table">
  <div class="table-toolbar">
    <mat-form-field appearance="outline" subscriptSizing="dynamic">
      <mat-label>Search all fraud alert fields</mat-label>
      <input matInput [formControl]="searchControl" />
    </mat-form-field>
    <button mat-stroked-button type="button" (click)="load()">Refresh data</button>
  </div>

  @if (error()) { <div class="error-banner">{{ error() }}</div> }

  <mtx-grid
    [data]="data()"
    [columns]="columns"
    [length]="total()"
    [loading]="loading()"
    [pageOnFront]="false"
    [pageIndex]="page() - 1"
    [pageSize]="pageSize()"
    [pageSizeOptions]="[20, 40, 80, 100]"
    [showFirstLastButtons]="true"
    [columnResizable]="true"
    [columnHideable]="true"
    [rowHover]="true"
    [rowStriped]="true"
    noResultText="No fraud alerts match your search"
    (page)="onPage($event)"
  />
</section>
